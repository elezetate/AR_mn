<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AR</title>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

  <style>
    :root {
      color-scheme: light;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f3f1ec;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    }

    model-viewer {
      width: 100vw;
      height: 100svh;
      background: #f3f1ec;
      --poster-color: #f3f1ec;
    }

    .ar-button {
      position: absolute;
      left: 50%;
      bottom: max(26px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 14px;
      line-height: 1;
      background: rgba(255, 255, 255, 0.78);
      color: #111;
      box-shadow: 0 8px 28px rgba(0,0,0,.14);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      cursor: pointer;
    }

    .ar-button:active {
      transform: translateX(-50%) scale(0.98);
    }
  </style>
</head>

<body>
  <model-viewer
    id="viewer"
    src="escultura_v06.glb?v=07-sinfondo"
    alt="Escultura digital en realidad aumentada"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="fixed"
    camera-controls
    touch-action="pan-y"
    disable-zoom
    auto-rotate
    camera-orbit="35deg 65deg 4m"
    field-of-view="30deg"
    environment-image="environment.png"
    exposure="0.9"
    shadow-intensity="0"
    shadow-softness="1"
    tone-mapping="aces">

    <button slot="ar-button" class="ar-button">Ver en AR</button>
  </model-viewer>
</body>
</html>
